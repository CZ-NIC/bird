variables:
  DEBIAN_FRONTEND: noninteractive
  LC_ALL: C.UTF-8
  GIT_STRATEGY: fetch
  DOCKER_CMD: docker --config="$HOME/.docker/$CI_JOB_ID/"
  IMG_BASE: registry.nic.cz/labs/bird
  TOOLS_DIR: /home/gitlab-runner/bird-tools
  STAYRTR_BINARY: /usr/bin/stayrtr

stages:
  - consistency
  - image
  - child-prepare
  - build
  - pkg
  - test
  - release

## Common rules
# Ignore WIP commits
.never_wip: &never_wip
  if: $CI_COMMIT_MESSAGE =~ /^(fixup! )*WIP/
  when: never
# Run for stable branches
.if_stable: &if_stable
  if: $CI_COMMIT_BRANCH =~ /^(stable-.*|thread-next|master)$/
  when: always

## Consistency checks for stable branches
commit-messages:
  stage: consistency
  script:
  - tools/git-check-commits
  rules:
  - *if_stable
  - when: never

## Child pipelines
.child-prepare: &child-prepare
  stage: child-prepare
  script:
    - apk add --update --no-cache python3 git
    - python3 -m venv venv
    - . venv/bin/activate
    - python3 -m ensurepip
    - pip3 install --no-cache --upgrade jinja2 pyyaml
    - mkdir -p obj/gitlab
    - 'cd misc/gitlab && python3 pipeline.py $TARGET > ../../obj/gitlab/$TARGET.yml'
  artifacts:
    paths:
      - obj/gitlab/*
  tags:
    - linux
    - docker

distro-build-prepare:
  <<: *child-prepare
  variables:
    TARGET: distro-build

distro-build-run:
  stage: build
  trigger:
    include:
      - artifact: obj/gitlab/distro-build.yml
        job: distro-build-prepare
    strategy: depend

release-prepare:
  <<: *child-prepare
  variables:
    TARGET: release

release-run:
  stage: build
  trigger:
    include:
      - artifact: obj/gitlab/release.yml
        job: release-prepare
    strategy: depend


## Build stage
#
# Now we compile and run unit tests ... in every single distribution.
# Every task needs its docker, see above.

.build: &build-base
  stage: build
  script:
  - export BRANCH=$CI_COMMIT_BRANCH
  - autoreconf
  - ./configure CPPFLAGS="$CPPFLAGS" LDFLAGS="$LDFLAGS" $CONFIGURE_OPTIONS
  # Detect which make is available
  - MAKE=make
  - which gmake 2>/dev/null >/dev/null && MAKE=gmake
  - $MAKE
  - $MAKE check
  # Build docs when tools are available
  - if which linuxdoc pdflatex sgmlsasp >/dev/null ; then $MAKE docs ; fi
  rules:
  - *never_wip
  - when: always

.build-linux: &build-linux
  <<: *build-base
  tags:
    - docker
    - linux
    - amd64

# Testing builds for just a single protocol each time

.build-only: &build-only
  <<: *build-linux
  image: registry.nic.cz/labs/bird:debian-12-amd64

