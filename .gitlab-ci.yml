---

variables:
  DEBIAN_FRONTEND: noninteractive
  LC_ALL: C.UTF-8
  GIT_STRATEGY: fetch
  DOCKER_CMD: docker --config="$HOME/.docker/$CI_JOB_ID/"
  IMG_BASE: registry.nic.cz/labs/bird
  TOOLS_DIR: /home/gitlab-runner/bird-tools
  STAYRTR_BINARY: /usr/local/bin/stayrtr
  GITLAB_API_URL: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/

stages:
  - consistency
  - image
  - build
  - pkg
  - install
  - test

## Common rule snippets

workflow:
  rules:
    - if: '($CI_PIPELINE_SOURCE == "web")'
      variables:
        wf_kind: manual
        wf_prefix: '[MAN] '
        wf_desc: '$CI_COMMIT_TITLE'
        PKG_RELINFO: '$[[ inputs.release-desc ]]'
        PKG_FIXUP: '$[[ inputs.release-fixup ]]'
    - if: '($CI_PIPELINE_SOURCE == "schedule")'
      variables:
        wf_kind: scheduled
        wf_prefix: '[SCD] '
        wf_desc: '$CI_COMMIT_TITLE'
    - if: '$CI_COMMIT_TAG'
      variables:
        wf_kind: tag
        wf_prefix: '[TAG] '
        wf_desc: '$CI_COMMIT_TAG'
    - if: '($CI_PIPELINE_SOURCE == "push")'
      variables:
        wf_kind: regular
        wf_prefix: ''
        wf_desc: '$CI_COMMIT_TITLE'
    - if: '($CI_COMMIT_BRANCH =~ /^(stable-.*|thread-next|master)$/) && ($CI_COMMIT_MESSAGE =~ /^NEWS and version update/)'
      variables:
        wf_kind: release
        wf_prefix: '[RELEASE] '
        wf_desc: '$CI_COMMIT_BRANCH'
    - if: '($CI_COMMIT_MESSAGE =~ /^NEWS and version update/)'
      variables:
        wf_kind: release-candidate
        wf_prefix: '[RC] '
        wf_desc: '$CI_COMMIT_BRANCH'
    - when: always
      variables:
        wf_kind: unknown
        wf_prefix: '[$CI_PIPELINE_SOURCE] '
        wf_desc: '$CI_COMMIT_TITLE'

  name: '$wf_prefix$wf_desc'

# Note: We would love to just write "if: $[[ inputs.packages ]]"
# but that's impossible because the value is expected to be a string.
#
# Should be fixable by several lines in
# lib/gitlab/ci/pipeline/expression/statement.rb
# but I don't have time to do that contribution to gitlab now.## Default rules for regular jobs
.default-rules:
# Manual, API and Scheduled jobs have an explicit input setting.
# Do not run anything unless explicitly requested for these.
  - if: '($CI_PIPELINE_SOURCE == "web")'
    when: never
  - if: '($CI_PIPELINE_SOURCE == "api")'
    when: never
  - if: '($CI_PIPELINE_SOURCE == "schedule")'
    when: never
# Do not run anything for WIP commits
  - if: '($CI_COMMIT_MESSAGE =~ /^(fixup! )*WIP/)'
    when: never
# Tags only happen on releases, don't run full automation
  - if: '$CI_COMMIT_TAG'
    when: never
  - when: on_success

## Pipeline information dump
pipeline-infodump:
  stage: consistency
  image: registry.nic.cz/labs/bird:docbuilder
  script:
  - |
    echo "### Variables ###"
    echo "\$CI_JOB_ID = $CI_JOB_ID"
    echo "\$CI_COMMIT_SHA = $CI_COMMIT_SHA"
    echo "\$CI_COMMIT_BRANCH = $CI_COMMIT_BRANCH"
    echo "\$CI_COMMIT_TAG = $CI_COMMIT_TAG"
    echo "\$CI_COMMIT_TITLE = $CI_COMMIT_TITLE"
    echo "\$CI_COMMIT_MESSAGE = $CI_COMMIT_MESSAGE"
    echo "\$CI_PIPELINE_SOURCE = $CI_PIPELINE_SOURCE"
    echo "\$CI_MERGE_REQUEST_IID = $CI_MERGE_REQUEST_IID"
    echo "\$GITLAB_API_URL = $GITLAB_API_URL"
    echo "\$wf_kind = $wf_kind"
    echo
    echo "### Inputs ###"
    echo "Netlab: $[[ inputs.netlab ]]"
    echo "Build: $[[ inputs.build ]]"
    echo "Packages: $[[ inputs.packages ]]"
    echo "Docker all: $[[ inputs.docker-all ]]"
    echo "Docker regex: $[[ inputs.docker-regex ]]"
    echo "Docker one: $[[ inputs.docker-one ]]"

## Pipeline consistency check
pipeline-uptodate:
  stage: consistency
  image: registry.nic.cz/labs/bird:docbuilder
  script:
  - autoreconf -i
  - ./configure
  - touch gitlab/template.yml.j2
  - make gitlab-venv
  - git status --porcelain
  - git diff --exit-code
  rules:
  - !reference [ .default-rules ]

## Build Docker consistency check
docker-uptodate:
  stage: consistency
  image: registry.nic.cz/labs/bird:docbuilder
  script:
  - autoreconf -i
  - ./configure
  - touch gitlab/data.yml.j2
  - make gitlab-docker VENV=1
  - touch gitlab/docker/docbuilder/Dockerfile # Docbuilder is a static image, not rebuilt by the templates
  - find gitlab/docker/ -type f -not -newer gitlab/data.yml.j2
  - '[ "`find gitlab/docker/ -type f -not -newer gitlab/data.yml.j2 | wc -l`" == "0" ]'
  - git status --porcelain
  - git diff --exit-code
  rules:
  - !reference [ .default-rules ]

## Consistency checks for stable branches
commit-messages:
  stage: consistency
  image: registry.nic.cz/labs/bird:docbuilder
  script:
  - tools/git-check-commits
  rules:
  - if: '($CI_COMMIT_BRANCH =~ /^(stable-.*|thread-next|master)$/)'
    when: on_success
  - if: '($CI_COMMIT_MESSAGE =~ /^NEWS and version update/)'
    when: on_success
  - when: never

## Tag check
tag-collect:
  stage: consistency
  image: registry.nic.cz/labs/bird:docbuilder
  script:
  - python3 -m venv venv
  - . venv/bin/activate
  - pip3 install requests
  - tools/git-check-tag-local $CI_COMMIT_TAG
  - tools/git-check-tag-ci $CI_COMMIT_SHA
  artifacts:
    paths:
      - obj/doc/bird-singlepage.html
      - obj/doc/prog-singlepage.html
      - bird-*.tar.gz
      - pkg/pkgs/*
      - pkg/srcpkgs/*
  rules:
  - if: '$CI_COMMIT_TAG'
    when: on_success
  - when: never

