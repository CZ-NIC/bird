build-netlab:
  stage: build
  variables:
    BDIR: build-netlab
  tags:
    - netlab
    - amd64
  script:
    - autoreconf
    - mkdir $BDIR
    - cd $BDIR
    - ../configure
    - BRANCH=$CI_COMMIT_BRANCH make
  artifacts:
    paths:
      - $BDIR/bird
      - $BDIR/birdc
    expire_in: 2 hours
  rules:
  - *never_wip
  - when: always

.test: &test-base
  stage: test
  needs: [build-netlab]
  tags:
    - netlab
    - amd64
  script:
    - DIR=$(pwd)
    - cd $TOOLS_DIR
    - sudo git clean -fx
    - git pull --ff-only
    - mv $DIR/build-netlab/* netlab/common/
    - ln -s $STAYRTR_BINARY netlab/common/stayrtr
    - cd netlab
    - sudo ./stop
    - sudo ./runtest -s v2 -m check $TEST_NAME
  rules:
  - *never_wip
  - when: always

