#######################################################
## A special task for preparing the release archives ##
#######################################################
build-release:
  image: registry.nic.cz/labs/bird:docbuilder
  needs: 
    - job: docker-docbuilder
      optional: true
  stage: build
  tags:
    - docker
    - linux
  script:
    - if [ "$CI_PIPELINE_SOURCE" == "merge_request_event" ]; then export BRANCH=mergerequest-$CI_MERGE_REQUEST_IID; else export BRANCH=$CI_COMMIT_BRANCH; fi
    - autoreconf
    - ./configure --with-protocols= --disable-client
    - make obj/doc/bird-singlepage.html obj/doc/prog-singlepage.html
    - if grep '<pre><code>PARSER FAILED ' obj/doc/bird-singlepage.html obj/doc/prog-singlepage.html; then echo "Documentation build is broken!"; false; fi
    - tools/make-archive
  artifacts:
    paths:
      - obj/doc/bird-singlepage.html
      - obj/doc/prog-singlepage.html
      - bird-*.tar.gz
    expire_in: 1 day
  rules: !reference [ .build-base-rules ]

# Packaging rules
# As we support some ancient versions of different distributions,
# we need to keep several different machineries. It's not so bad
# but it's bad nevertheless.
#
# We do NOT build separate documentation packages in these rules.

.pkg-base: &pkg-base
  rules:
  - if: '"$[[ inputs.packages ]]" == "true"'
  - if: '$CI_COMMIT_TAG'
    when: never
  - if: '($CI_COMMIT_MESSAGE =~ /^NEWS and version update/)'
    when: on_success
  - if: '($CI_COMMIT_BRANCH !~ /^(stable-.*|thread-next|master)$/)'
    when: never
  - !reference [ .default-rules ]

.pkg-deb: &pkg-deb
  <<: *pkg-base
  stage: pkg
  script:
    - if [ "$CI_PIPELINE_SOURCE" == "merge_request_event" ]; then export BRANCH=mergerequest-$CI_MERGE_REQUEST_IID; else export BRANCH=$CI_COMMIT_BRANCH; fi
    - tools/make-deb
  artifacts:
    paths:
      - pkg/pkgs/*
      - pkg/srcpkgs/*

.pkg-rpm: &pkg-rpm
  <<: *pkg-base
  stage: pkg
  script:
    - if [ "$CI_PIPELINE_SOURCE" == "merge_request_event" ]; then export BRANCH=mergerequest-$CI_MERGE_REQUEST_IID; else export BRANCH=$CI_COMMIT_BRANCH; fi
    - STABLE_BUILDDIR=true tools/make-rpm
  artifacts:
    paths:
      - pkg/pkgs/*
      - pkg/srcpkgs/*



